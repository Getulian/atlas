  <span id="c3">ALT 00.0000</span>
</div>

<div id="bl">Mentorship Program &mdash; 2026</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── Font settings ─────────────────────────────────────────────
const FS = 11, CW = 6.7, CH = FS * 1.3;
const FONT = FS + 'px "Courier New",monospace';
const RAMP_DENSE = ' .\'`^",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';
const RAMP = ' .,:;=+*#@';
function b2c(b, r) { return r[Math.floor(Math.max(0,Math.min(1,b)) * (r.length-1))]; }

// ── Order Book ────────────────────────────────────────────────
const OB_LEVELS = 40;
const TICK = 0.25;
let midPrice = 5234.75;
let lastObUpdate = 0;
const OB_UPDATE_MS = 180;

// Each level: { size, flash }
const asks = Array.from({length: OB_LEVELS}, (_, i) => ({
  size: 50 + Math.floor(Math.random() * 600),
  flash: 0
}));
const bids = Array.from({length: OB_LEVELS}, (_, i) => ({
  size: 50 + Math.floor(Math.random() * 600),
  flash: 0
}));

function updateOB(now) {
  if (now - lastObUpdate < OB_UPDATE_MS) return;
  lastObUpdate = now;

  // Mid price random walk
  midPrice += (Math.random() - 0.5) * TICK * 0.8;
  midPrice = Math.round(midPrice / TICK) * TICK;

  // Update a few levels
  const n = 3 + Math.floor(Math.random() * 5);
  for (let k = 0; k < n; k++) {
    const side = Math.random() < 0.5 ? asks : bids;
    const idx = Math.floor(Math.random() * OB_LEVELS);
    const delta = Math.floor((Math.random() - 0.4) * 200);
    side[idx].size = Math.max(10, side[idx].size + delta);
    side[idx].flash = 1.0;
  }
  // Decay flash
  asks.forEach(a => { if (a.flash > 0) a.flash -= 0.15; });
  bids.forEach(b => { if (b.flash > 0) b.flash -= 0.15; });
}

const OB_BAR_CHARS = '░▒▓█';
const MAX_SIZE = 700;

function sizeBar(size, maxW) {
  const ratio = Math.min(1, size / MAX_SIZE);
  const filled = Math.round(ratio * maxW);
  let bar = '';
  for (let i = 0; i < maxW; i++) {
    if (i < filled - 1) bar += '█';
    else if (i === filled - 1) bar += '▓';
    else bar += '░';
  }
  return bar;
}

function drawOrderBook(now) {
  updateOB(now);

  const OB_FS = 9;
  const OB_CW = 5.5;
  const OB_CH = OB_FS * 1.35;
  ctx.font = OB_FS + 'px "Courier New",monospace';
  ctx.textAlign = 'left';

  const BAR_W = 16;
  const ROW_W = OB_CW * (8 + 1 + 5 + 1 + BAR_W); // price + sp + size + sp + bar
  const colsPerScreen = Math.max(1, Math.floor(W / ROW_W));
  const colW = W / colsPerScreen;

  for (let col = 0; col < colsPerScreen; col++) {
    const ox = col * colW + OB_CW;

    // How many rows fit on screen
    const totalRows = Math.floor(H / OB_CH);
    const half = Math.floor(totalRows / 2);
    const askLevels = Math.min(OB_LEVELS, half - 1);
    const bidLevels = Math.min(OB_LEVELS, totalRows - half - 2);

    // === ASKS (top → mid) — red ===
    for (let i = askLevels - 1; i >= 0; i--) {
      const rowY = (half - 1 - (askLevels - 1 - i)) * OB_CH;
      const price = midPrice + (i + 0.5) * TICK;
      const level = asks[i];
      const flash = Math.max(0, level.flash);
      const alpha = 0.08 + flash * 0.25;

      const priceStr = price.toFixed(2).padStart(8);
      const sizeStr  = level.size.toString().padStart(5);
      const bar      = sizeBar(level.size, BAR_W);

      ctx.fillStyle = `rgba(180,40,40,${alpha})`;
      ctx.fillText(priceStr, ox, rowY);
      ctx.fillStyle = `rgba(220,80,80,${alpha * 0.8})`;
      ctx.fillText(sizeStr, ox + OB_CW * 9, rowY);
      ctx.fillStyle = `rgba(140,30,30,${alpha * 0.6})`;
      ctx.fillText(bar, ox + OB_CW * 15, rowY);
    }

    // === SPREAD LINE ===
    const midY = half * OB_CH;
    const spread = (TICK * 0.5).toFixed(2);
    ctx.fillStyle = 'rgba(100,100,100,0.12)';
    ctx.fillText(
      '─'.repeat(Math.floor(colW / OB_CW - 1)),
      ox, midY
    );
    ctx.fillStyle = 'rgba(120,120,120,0.15)';
    const midLabel = midPrice.toFixed(2);
    ctx.fillText(midLabel, ox + colW/2 - midLabel.length * OB_CW / 2, midY);

    // === BIDS (mid → bottom) — blue ===
    for (let i = 0; i < bidLevels; i++) {
      const rowY = (half + 1 + i) * OB_CH;
      const price = midPrice - (i + 0.5) * TICK;
      const level = bids[i];
      const flash = Math.max(0, level.flash);
      const alpha = 0.08 + flash * 0.22;

      const priceStr = price.toFixed(2).padStart(8);
      const sizeStr  = level.size.toString().padStart(5);
      const bar      = sizeBar(level.size, BAR_W);

      ctx.fillStyle = `rgba(40,100,180,${alpha})`;
      ctx.fillText(priceStr, ox, rowY);
      ctx.fillStyle = `rgba(70,140,220,${alpha * 0.8})`;
      ctx.fillText(sizeStr, ox + OB_CW * 9, rowY);
      ctx.fillStyle = `rgba(30,70,140,${alpha * 0.6})`;
      ctx.fillText(bar, ox + OB_CW * 15, rowY);
    }
  }
}

// ── World land map ─────────────────────────────────────────────
const LW = 120, LH = 60;
const LAND = new Uint8Array(LW * LH);
function setEllipse(lonC, latC, dLon, dLat) {
  for (let lat = latC-dLat; lat <= latC+dLat; lat += 1.5) {
    const f = Math.sin((lat-latC)/dLat*Math.PI/2);
    const dL = dLon * Math.sqrt(Math.max(0, 1-f*f));
    for (let lon = lonC-dL; lon <= lonC+dL; lon += 1.5) {
      const x = Math.round((lon+180)/360*LW);
      const y = Math.round((90-lat)/180*LH);
      if (x>=0&&x<LW&&y>=0&&y<LH) LAND[y*LW+x]=1;
    }
  }
}
setEllipse(-100,50,30,20); setEllipse(-105,35,18,12); setEllipse(-85,20,10,8);
setEllipse(-60,-10,20,28);
setEllipse(15,52,18,12);
setEllipse(20,5,22,32);
setEllipse(90,50,55,22); setEllipse(105,25,20,18); setEllipse(135,35,10,12);
setEllipse(134,-25,18,12);
setEllipse(-42,72,12,8);
for (let y=0;y<3;y++) for (let x=0;x<LW;x++) LAND[y*LW+x]=1;
for (let y=LH-4;y<LH;y++) for (let x=0;x<LW;x++) LAND[y*LW+x]=1;

function isLand(lon, lat) {
  const x = Math.round(((lon%(2*Math.PI)+2*Math.PI)%(2*Math.PI))/(2*Math.PI)*LW)%LW;
  const y = Math.round((Math.PI/2-lat)/Math.PI*LH);
  if (y<0||y>=LH) return true;
  return LAND[y*LW+x]===1;
}

// ── ASCII Earth ────────────────────────────────────────────────
let earthRot = 0;
const SUN = {x:0.7, y:0.3, z:0.7};

function drawEarth(cx, cy, radius) {
  const cols = Math.ceil(radius*2/CW)+2;
  const rows = Math.ceil(radius*2/CH)+2;
  ctx.font = FONT;
  ctx.textAlign = 'left';
  for (let row=0; row<=rows; row++) {
    for (let col=0; col<=cols; col++) {
      const nx=(col-cols/2)*CW/radius;
      const ny=(row-rows/2)*CH/radius;
      const d2=nx*nx+ny*ny;
      if (d2>1) continue;
      const nz=Math.sqrt(1-d2);
      const lit=nx*SUN.x+ny*SUN.y+nz*SUN.z;
      if (lit<-0.1) continue;
      const lon=Math.atan2(nx,nz)+earthRot;
      const lat=Math.asin(Math.max(-1,Math.min(1,ny)));
      const land=isLand(lon,lat);
      const litC=Math.max(0,lit);
      const edge=nz;
      let bright,r,g,b;
      if (land) {
        bright=0.15+litC*0.85;
        const pole=lat>1.2||lat<-1.1;
        r=bright*(pole?220:80); g=bright*(pole?220:160); b=bright*(pole?235:80);
      } else {
        bright=0.05+litC*0.6;
        r=bright*30; g=bright*80; b=bright*200;
      }
      const atm=Math.max(0,1-edge*1.5);
      r+=atm*30; g+=atm*60; b+=atm*120;
      const ch=b2c(Math.min(1,bright+atm*0.3),RAMP);
      ctx.fillStyle=`rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
      ctx.fillText(ch, cx-cols/2*CW+col*CW, cy-rows/2*CH+row*CH);
    }
  }
}

// ── ASCII Atlas ────────────────────────────────────────────────
const atlasImg = new Image();
let atlasPixels = null;
const AW=48, AH=54;
atlasImg.onload=()=>{
  const oc=document.createElement('canvas'); oc.width=AW; oc.height=AH;
  const og=oc.getContext('2d');
  og.drawImage(atlasImg,0,0,AW,AH);
  atlasPixels=og.getImageData(0,0,AW,AH).data;
};

function drawAtlasASCII(cx,cy){
  if (!atlasPixels) return;
  ctx.font=FONT; ctx.textAlign='center';
  const sx=cx-AW*CW/2;
  for (let row=0;row<AH;row++) for (let col=0;col<AW;col++) {
    const i=(row*AW+col)*4;
    const bri=(0.299*atlasPixels[i]+0.587*atlasPixels[i+1]+0.114*atlasPixels[i+2])/255;
    if (bri<0.08) continue;
    const ch=b2c(bri,RAMP_DENSE);
    ctx.fillStyle=`rgba(220,220,220,${0.3+bri*0.7})`;
    ctx.fillText(ch, sx+col*CW+CW/2, cy+row*CH);
  }
}

// ── Title & INCOMING ─────────────────────────────────────────
const ATLAS_ART=[
  ' ######   ########  ##          ##      ########',
  '##    ##     ##     ##         ####     ##      ',
  '##    ##     ##     ##        ##  ##    ##      ',
  '########     ##     ##       ########   ######  ',
  '##    ##     ##     ##      ##      ##        ##',
  '##    ##     ##     ##      ##      ##        ##',
  '##    ##     ##     ##########      ##  ########',
];
function drawTitle(cx,cy,alpha){
  const sc=Math.min(W/600,1.4);
  const tFS=Math.floor(FS*sc), tCW=tFS*0.62;
  ctx.font=tFS+'px "Courier New",monospace'; ctx.textAlign='left';
  const sx=cx-ATLAS_ART[0].length*tCW/2;
  ATLAS_ART.forEach((line,row)=>{
    for (let col=0;col<line.length;col++){
      const ch=line[col]; if(ch===' ')continue;
      ctx.fillStyle=`rgba(255,255,255,${alpha*(ch==='#'?1:.4)})`;
      ctx.fillText(ch, sx+col*tCW, cy+row*tFS*1.15);
    }
  });
}

let incomingReveal=0, lastRevealTime=0;
function drawIncoming(cx,cy,t,alpha){
  const text='INCOMING';
  if (t>3000&&incomingReveal<text.length&&t-lastRevealTime>120){ incomingReveal++; lastRevealTime=t; }
  const display=text.slice(0,incomingReveal);
  const cur=Math.floor(t/500)%2===0?'_':' ';
  const full=display+(incomingReveal<text.length?cur:(Math.floor(t/500)%2===0?'_':' '));
  ctx.font=FONT; ctx.textAlign='center';
  ctx.fillStyle=`rgba(255,255,255,${alpha*0.3})`;
  ctx.fillText(full.split('').join('  '), cx, cy);
}

// ── Scanlines ──────────────────────────────────────────────────
function drawScanlines(){
  for (let y=0;y<H;y+=4){ ctx.fillStyle='rgba(0,0,0,0.06)'; ctx.fillRect(0,y,W,1); }
}

// ── Coords ─────────────────────────────────────────────────────
const c1el=document.getElementById('c1'), c2el=document.getElementById('c2'), c3el=document.getElementById('c3');
let cf=0;
function animCoords(){
  if(++cf%20===0){
    c1el.textContent='LAT '+(48.8566+(Math.random()-.5)*.001).toFixed(4);
    c2el.textContent='LON '+(2.3522+(Math.random()-.5)*.001).toFixed(4);
    c3el.textContent='ALT '+(Math.random()*.001).toFixed(4);
  }
}

// ── Main loop ──────────────────────────────────────────────────
let startTime=null;
function loop(ts){
  if(!startTime) startTime=ts;
  const t=ts-startTime;

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // Order book background
  drawOrderBook(ts);

  // Layout
  const earthR=Math.min(W,H)*0.25;
  const earthCX=W/2, earthCY=H*0.35;
  const atlasTop=earthCY+earthR+CH*2;

  drawAtlasASCII(earthCX, atlasTop);

  earthRot+=0.004;
  drawEarth(earthCX, earthCY, earthR);

  const atlasBottom=atlasTop+AH*CH;
  const titleAlpha=Math.min(1,Math.max(0,(t-1200)/800));
  drawTitle(earthCX, atlasBottom+CH*1.5, titleAlpha);

  const titleH=ATLAS_ART.length*FS*1.15;
  const incomingAlpha=Math.min(1,Math.max(0,(t-2500)/600));
  drawIncoming(earthCX, atlasBottom+titleH+CH*4, t, incomingAlpha);

  drawScanlines();
  animCoords();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
