<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:"Helvetica Neue",Arial,sans-serif}
#three{position:fixed;top:0;left:0;display:block;z-index:1}
body::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05)2px,rgba(0,0,0,0.05)4px);
  pointer-events:none;z-index:20}
#ui{position:fixed;bottom:12vh;left:0;width:100%;display:flex;flex-direction:column;align-items:center;pointer-events:none;z-index:15}
.title{font-size:clamp(52px,8vw,88px);font-weight:100;letter-spacing:.55em;color:#fff;text-transform:uppercase;
  text-shadow:0 0 80px rgba(139,0,0,.5),0 0 120px rgba(139,0,0,.2);
  opacity:0;animation:titleIn 1.5s ease 1s forwards,glitch 9s 3s infinite}
@keyframes titleIn{from{opacity:0;letter-spacing:.9em}to{opacity:1;letter-spacing:.55em}}
@keyframes glitch{
  0%,88%,100%{text-shadow:0 0 80px rgba(139,0,0,.5),0 0 120px rgba(139,0,0,.2)}
  89%{text-shadow:-3px 0 #8B0000,3px 0 #4488cc;transform:translate(-1px)}
  90%{text-shadow:3px 0 #8B0000,-3px 0 #4488cc;transform:translate(1px)}
  91%{text-shadow:none;transform:translate(0)}}
.divider{width:1px;height:0;background:linear-gradient(180deg,transparent,rgba(139,0,0,.9),transparent);
  margin:18px 0;opacity:0;animation:divIn 1s ease 2.2s forwards}
@keyframes divIn{to{height:36px;opacity:1}}
.incoming{font-size:11px;letter-spacing:.65em;color:rgba(255,255,255,.35);text-transform:uppercase;
  opacity:0;animation:fadeIn 1s ease 2.8s forwards}
.cursor{display:inline-block;width:5px;height:10px;background:#4488cc;margin-left:3px;vertical-align:middle;
  animation:blink 1s step-end 3.8s infinite;opacity:0;animation-fill-mode:forwards}
@keyframes fadeIn{to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#tl{position:fixed;top:28px;left:36px;z-index:30}
#tl .n{font-size:10px;letter-spacing:4px;color:#8B0000;text-transform:uppercase}
#tl .s{font-size:10px;letter-spacing:4px;color:#222;text-transform:uppercase;margin-top:3px}
#tr{position:fixed;top:28px;right:36px;z-index:30;text-align:right}
#tr span{display:block;font-size:10px;letter-spacing:3px;color:#1a1a1a;margin-bottom:3px}
#tr span.hi{color:#4488cc}
#bar{position:fixed;bottom:0;left:0;height:1px;background:linear-gradient(90deg,#8B0000,#4488cc,#8B0000);
  z-index:30;width:0;animation:barGrow 2s ease .5s forwards}
@keyframes barGrow{to{width:100%}}
#bl{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:4px;
  color:#1a1a1a;text-transform:uppercase;z-index:30;opacity:0;animation:fadeIn 1s ease 4s forwards}
</style>
</head>
<body>
<canvas id="three"></canvas>
<div id="tl"><div class="n">00 &mdash; 01</div><div class="s">Initialization</div></div>
<div id="tr">
  <span id="c1">LAT 48.8566</span>
  <span id="c2" class="hi">LON 02.3522</span>
  <span id="c3">ALT 00.0000</span>
</div>
<div id="ui">
  <div class="title">ATLAS</div>
  <div class="divider"></div>
  <div class="incoming">INCOMING<span class="cursor"></span></div>
</div>
<div id="bar"></div>
<div id="bl">Mentorship Program &mdash; 2026</div>

<script src="three.min.js"></script>
<script>
const canvas = document.getElementById('three');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
cam.position.set(0, 0, 6);

window.addEventListener('resize', ()=>{
  renderer.setSize(innerWidth, innerHeight);
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
});

// Stars
function addStars(n,spread,size,op){
  const g=new THREE.BufferGeometry(),p=new Float32Array(n*3);
  for(let i=0;i<n*3;i++) p[i]=(Math.random()-.5)*spread;
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size,transparent:true,opacity:op,sizeAttenuation:true})));
}
addStars(3000,800,.6,.9);
addStars(1500,400,1.1,.4);

// Nebula background sphere
const nbMat=new THREE.ShaderMaterial({
  side:THREE.BackSide,
  vertexShader:`varying vec3 vPos;void main(){vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vPos;void main(){
    vec3 n=normalize(vPos);
    float r=smoothstep(-.3,.6,n.y)*0.05;
    float b=smoothstep(.4,-.5,n.y)*0.07;
    gl_FragColor=vec4(r,r*.3,b+r*.4,1.);}`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(500,8,8),nbMat));

// Cloud texture
function makeClouds(){
  const c=document.createElement('canvas');c.width=1024;c.height=512;
  const g=c.getContext('2d');
  for(let i=0;i<200;i++){
    const x=Math.random()*1024,y=Math.random()*512,r=Math.random()*50+10;
    const cg=g.createRadialGradient(x,y,0,x,y,r);
    cg.addColorStop(0,'rgba(255,255,255,.25)');cg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=cg;g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();
  }
  const t=new THREE.CanvasTexture(c);t.needsUpdate=true;return t;
}

// Load textures via TextureLoader (handles async properly)
const loader = new THREE.TextureLoader();
const R = 1.75;

loader.load('earth.jpg', function(earthTex){
  loader.load('earth_spec.jpg', function(specTex){

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(R,64,64),
      new THREE.MeshPhongMaterial({
        map:earthTex,
        specularMap:specTex,
        specular:new THREE.Color(.25,.25,.25),
        shininess:30
      })
    );
    earth.rotation.z = 0.15;
    earth.position.set(0, 0.7, 0);
    scene.add(earth);

    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(R*1.012,64,64),
      new THREE.MeshPhongMaterial({map:makeClouds(),transparent:true,opacity:.45,depthWrite:false})
    );
    clouds.position.copy(earth.position);
    scene.add(clouds);

    // Atmosphere
    const atm1 = new THREE.Mesh(new THREE.SphereGeometry(R*1.05,32,32),
      new THREE.MeshPhongMaterial({color:0x3366dd,transparent:true,opacity:.12,depthWrite:false}));
    atm1.position.copy(earth.position); scene.add(atm1);

    const atm2 = new THREE.Mesh(new THREE.SphereGeometry(R*1.18,32,32),
      new THREE.MeshPhongMaterial({color:0x1144cc,transparent:true,opacity:.07,side:THREE.BackSide,depthWrite:false}));
    atm2.position.copy(earth.position); scene.add(atm2);

    // Atlas sprite — AdditiveBlending = black becomes transparent
    loader.load('atlas.jpg', function(atlasTex){
      const sp = new THREE.Sprite(new THREE.SpriteMaterial({
        map:atlasTex,
        blending:THREE.AdditiveBlending,
        depthWrite:false,
        opacity:1.0
      }));
      sp.scale.set(3.0, 3.4, 1);
      sp.position.set(0, -1.8, -.2);
      scene.add(sp);
      window._atlas = sp;
    });

    // Lights
    scene.add(new THREE.AmbientLight(0x223355,.5));
    const sun = new THREE.DirectionalLight(0xfff5ee,2.0);
    sun.position.set(5,3,5); scene.add(sun);
    const rim = new THREE.DirectionalLight(0x4488cc,.4);
    rim.position.set(-5,2,-4); scene.add(rim);

    window._earth = earth;
    window._clouds = clouds;
  });
});

// Coords
const c1=document.getElementById('c1'),c2=document.getElementById('c2'),c3=document.getElementById('c3');
let cf=0;
function coords(){if(++cf%18===0){
  c1.textContent='LAT '+(48.8566+(Math.random()-.5)*.001).toFixed(4);
  c2.textContent='LON '+(2.3522+(Math.random()-.5)*.001).toFixed(4);
  c3.textContent='ALT '+(Math.random()*.001).toFixed(4);
}}

let t=0;
(function loop(){
  requestAnimationFrame(loop);
  t+=.003;
  if(window._earth){
    window._earth.rotation.y+=.0014;
    window._clouds.rotation.y+=.002;
    window._clouds.rotation.x+=.0002;
  }
  if(window._atlas){
    window._atlas.position.y=-1.8+Math.sin(t*.65)*.07;
  }
  coords();
  renderer.render(scene,cam);
})();
</script>
</body>
</html>
