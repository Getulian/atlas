<script>
const canvas = document.getElementById('three');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000005);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
cam.position.set(0, 0, 6);

window.addEventListener('resize', ()=>{
  renderer.setSize(innerWidth, innerHeight);
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
});

// Stars
const sGeo = new THREE.BufferGeometry();
const sPos = new Float32Array(5000*3);
for(let i=0;i<5000*3;i++) sPos[i]=(Math.random()-.5)*800;
sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({color:0xffffff,size:.5,transparent:true,opacity:.9,sizeAttenuation:true})));

// Earth texture
function makeEarth(){
  const c=document.createElement('canvas'); c.width=2048; c.height=1024;
  const g=c.getContext('2d');
  // Ocean
  g.fillStyle='#0c2040'; g.fillRect(0,0,2048,1024);
  // Ocean depth variation
  for(let i=0;i<600;i++){
    g.fillStyle='rgba(8,30,70,'+(Math.random()*.3+.1)+')';
    g.beginPath(); g.arc(Math.random()*2048,Math.random()*1024,Math.random()*20+3,0,Math.PI*2); g.fill();
  }
  // Continents (rough shapes)
  const shapes=[
    // N.America
    {pts:[[280,190],[470,170],[540,250],[510,350],[440,390],[340,370],[260,300]],col:'#1a3a14'},
    {pts:[[240,340],[350,370],[330,450],[250,480],[200,430]],col:'#1e3e18'},
    // S.America
    {pts:[[350,470],[450,455],[490,540],[480,650],[420,730],[355,720],[310,630],[320,530]],col:'#1a3a14'},
    // Europe
    {pts:[[900,175],[990,155],[1060,195],[1090,265],[1040,305],[950,315],[890,275],[870,215]],col:'#224818'},
    // Africa
    {pts:[[930,315],[1065,295],[1130,380],[1150,510],[1105,630],[1020,710],[935,685],[870,580],[850,445],[875,355]],col:'#1a3a14'},
    // Asia
    {pts:[[1090,135],[1360,115],[1560,155],[1650,245],[1630,325],[1510,365],[1380,345],[1230,295],[1130,235]],col:'#1e4015'},
    {pts:[[1370,345],[1550,365],[1590,445],[1510,490],[1380,465],[1295,405]],col:'#224818'},
    // Australia
    {pts:[[1530,555],[1670,535],[1730,605],[1710,685],[1625,725],[1535,685],[1495,620]],col:'#2a4a1a'},
  ];
  shapes.forEach(s=>{
    g.fillStyle=s.col; g.beginPath();
    g.moveTo(s.pts[0][0],s.pts[0][1]);
    s.pts.slice(1).forEach(p=>g.lineTo(p[0],p[1]));
    g.closePath(); g.fill();
    // subtle highlight
    g.fillStyle='rgba(60,90,20,.25)'; g.beginPath();
    g.moveTo(s.pts[0][0]-3,s.pts[0][1]-3);
    s.pts.slice(1).forEach(p=>g.lineTo(p[0]-3,p[1]-3));
    g.closePath(); g.fill();
  });
  // North pole
  let pg=g.createRadialGradient(1024,0,0,1024,0,200);
  pg.addColorStop(0,'rgba(215,235,255,.95)');
  pg.addColorStop(.65,'rgba(160,205,240,.45)');
  pg.addColorStop(1,'rgba(80,140,200,0)');
  g.fillStyle=pg; g.fillRect(0,0,2048,200);
  // South pole
  pg=g.createRadialGradient(1024,1024,0,1024,1024,190);
  pg.addColorStop(0,'rgba(225,240,255,.95)');
  pg.addColorStop(.65,'rgba(160,205,240,.45)');
  pg.addColorStop(1,'rgba(80,140,200,0)');
  g.fillStyle=pg; g.fillRect(0,845,2048,179);
  const t=new THREE.CanvasTexture(c); t.needsUpdate=true; return t;
}

// Cloud texture
function makeClouds(){
  const c=document.createElement('canvas'); c.width=1024; c.height=512;
  const g=c.getContext('2d');
  for(let i=0;i<180;i++){
    const x=Math.random()*1024,y=Math.random()*512,r=Math.random()*55+12;
    const cg=g.createRadialGradient(x,y,0,x,y,r);
    cg.addColorStop(0,'rgba(255,255,255,.2)'); cg.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=cg; g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
  }
  const t=new THREE.CanvasTexture(c); t.needsUpdate=true; return t;
}

// Earth
const R=1.7;
const earth=new THREE.Mesh(
  new THREE.SphereGeometry(R,64,64),
  new THREE.MeshPhongMaterial({map:makeEarth(),shininess:18,specular:new THREE.Color(.04,.09,.18)})
);
earth.rotation.z=0.18;
earth.position.set(0,0.6,0);
scene.add(earth);

// Clouds layer
const clouds=new THREE.Mesh(
  new THREE.SphereGeometry(R*1.012,64,64),
  new THREE.MeshPhongMaterial({map:makeClouds(),transparent:true,opacity:.38,depthWrite:false})
);
clouds.position.copy(earth.position);
scene.add(clouds);

// Atmosphere inner
const atm1=new THREE.Mesh(
  new THREE.SphereGeometry(R*1.06,32,32),
  new THREE.MeshPhongMaterial({color:0x2255bb,transparent:true,opacity:.12,depthWrite:false})
);
atm1.position.copy(earth.position); scene.add(atm1);

// Atmosphere outer glow
const atm2=new THREE.Mesh(
  new THREE.SphereGeometry(R*1.16,32,32),
  new THREE.MeshPhongMaterial({color:0x1144aa,transparent:true,opacity:.06,side:THREE.BackSide,depthWrite:false})
);
atm2.position.copy(earth.position); scene.add(atm2);

// Atlas sprite
const img=new Image();
img.onload=()=>{
  const tex=new THREE.Texture(img); tex.needsUpdate=true;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:.92,depthWrite:false}));
  sp.scale.set(2.8,3.2,1);
  sp.position.set(0,-1.7,0);
  scene.add(sp);
  window._atlas=sp;
};

scene.add(new THREE.AmbientLight(0x112233,.7));
const sun=new THREE.DirectionalLight(0xfff0dd,1.6); sun.position.set(5,3,4); scene.add(sun);
const rim=new THREE.DirectionalLight(0x4488cc,.35); rim.position.set(-4,1,-3); scene.add(rim);

// Coords
const c1=document.getElementById('c1'),c2=document.getElementById('c2'),c3=document.getElementById('c3');
let cf=0;
function coords(){if(++cf%18===0){
  c1.textContent='LAT '+(48.8566+(Math.random()-.5)*.001).toFixed(4);
  c2.textContent='LON '+(2.3522+(Math.random()-.5)*.001).toFixed(4);
  c3.textContent='ALT '+(Math.random()*.001).toFixed(4);
}}

let t=0;
(function loop(){
  requestAnimationFrame(loop);
  t+=.003;
  earth.rotation.y+=.0015;
  clouds.rotation.y+=.002; clouds.rotation.x+=.0002;
  if(window._atlas){
    window._atlas.position.y=-1.7+Math.sin(t*.7)*.06;
    window._atlas.material.opacity=.86+Math.sin(t*.5)*.06;
  }
  coords();
  renderer.render(scene,cam);
})();
